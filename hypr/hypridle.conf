general {
    lock_cmd = ~/.config/hyprlock/scripts/hyprlock.sh
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on && pactl set-sink-mute @DEFAULT_SINK@ 0
}

listener {
    timeout = 600
    on-timeout = ~/.config/hyprlock/scripts/hyprlock.sh
}

listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 1800
    on-timeout = systemctl suspend
}