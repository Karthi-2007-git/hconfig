# ======================================

# Kitty Terminal Configuration

# ======================================

# ---------- Fonts ----------

font_family MesloLGS Nerd Font Mono
bold_font MesloLGS Nerd Font Mono
italic_font MesloLGS Nerd Font Mono
bold_italic_font MesloLGS Nerd Font Mono
font_size 13

disable_ligatures no
adjust_line_height 2

# ---------- Shell ----------

shell zsh
shell_integration enabled

# ---------- Cursor ----------

cursor_shape beam
cursor_blink_interval 0.25
cursor_trail 2
cursor #cba6f7
cursor_text_color background

# ---------- Performance (smooth on high refresh displays) ----------

repaint_delay 8
input_delay 2
sync_to_monitor yes

# ---------- Scrolling ----------

scrollback_lines 10000
wheel_scroll_multiplier 5
touch_scroll_multiplier 3

# ---------- Window ----------

confirm_os_window_close 0
remember_window_size no
placement_strategy center

initial_window_width 1000
initial_window_height 700

window_padding_width 10
hide_window_decorations yes

# ---------- Transparency ----------

background_opacity 0.85
dynamic_background_opacity yes

# ---------- URL Handling ----------

detect_urls yes
open_url_with default
url_style curly

# ---------- Bells ----------

enable_audio_bell no

# ---------- Scrollbars ----------

scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_hover_opacity 0

# ---------- Theme ----------

# One Dark theme

include current-theme.conf

# Improve readability

foreground #e6e9ef

# Selection

selection_background #4e4a6d
selection_foreground #ffffff
